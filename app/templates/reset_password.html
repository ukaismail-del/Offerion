<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password — Offerion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <nav class="top-nav">
      <div class="top-nav-inner">
        <a href="/" class="top-nav-brand">Offerion</a>
        <div class="top-nav-links">
          <a href="/login" class="active">Log In</a>
          <a href="/signup">Sign Up</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="auth-card">
        <h1 class="auth-title">Set a New Password</h1>
        {% if error %}
        <p class="msg-error" style="text-align: center">{{ error }}</p>
        {% endif %} {% if token_valid %}
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <label class="form-label" for="password">New Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="6"
            placeholder="At least 6 characters"
          />

          <label class="form-label" for="confirm_password"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            required
            minlength="6"
            placeholder="Type it again"
          />

          <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg btn-action">
              Update Password
            </button>
          </div>
        </form>
        {% else %}
        <p class="auth-alt">
          Request a fresh link from
          <a href="/forgot-password">Forgot Password</a>.
        </p>
        {% endif %}
      </div>
    </div>
  </body>
</html>
