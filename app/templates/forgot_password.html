<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — Offerion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <nav class="top-nav">
      <div class="top-nav-inner">
        <a href="/" class="top-nav-brand">Offerion</a>
        <div class="top-nav-links">
          <a href="/login" class="active">Log In</a>
          <a href="/signup">Sign Up</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="auth-card">
        <h1 class="auth-title">Reset Your Password</h1>
        {% if message %}
        <p class="msg-success" style="text-align: center">{{ message }}</p>
        {% endif %} {% if error %}
        <p class="msg-error" style="text-align: center">{{ error }}</p>
        {% endif %}
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="you@example.com"
          />

          <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg btn-action">
              Send Reset Link
            </button>
          </div>
        </form>

        {% if dev_link %}
        <div class="card" style="margin-top: var(--space-md)">
          <p class="msg-warning">
            Email delivery is not configured in this environment. Use this
            temporary reset link:
            <a href="{{ dev_link }}">Reset password</a>
          </p>
        </div>
        {% endif %}

        <p class="auth-alt">Back to <a href="/login">Log in</a></p>
      </div>
    </div>
  </body>
</html>
